apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatch-service
  template:
    metadata:
      labels:
        app: dispatch-service
    spec:
      containers:
        - name: dispatch-service
          image: vroom-mvp/dispatch-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_ADDR
              value: "redis.platform.svc.cluster.local:6379"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
