apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-service
spec:
  selector:
    matchLabels:
      app: dispatch-service
  template:
    metadata:
      labels:
        app: dispatch-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis.platform.svc.cluster.local 6379; do
                echo "waiting for redis..."; sleep 3
              done
      containers:
        - name: dispatch-service
          image: vroom-mvp/dispatch-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_ADDR
              value: "redis.platform.svc.cluster.local:6379"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "tempo.monitoring.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "dispatch-service"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
