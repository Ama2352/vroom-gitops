apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dispatch-service
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: api.vroom.local
      http:
        paths:
          - path: /v1/dispatch
            pathType: Prefix
            backend:
              service:
                name: dispatch-service
                port:
                  number: 8080
