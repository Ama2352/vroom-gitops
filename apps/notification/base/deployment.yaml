apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: copy-migrations
          image: vroom-mvp/notification-service:latest
          command: ["sh", "-c", "cp -av /app/migrations/. /migrations/"]
          volumeMounts:
            - name: shared-migrations
              mountPath: /migrations
        - name: migrate
          image: migrate/migrate:v4.16.2
          command: ["sh", "-c"]
          args:
            - "cd /migrations && /migrate -path . -database \"$DATABASE_URL\" up"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: notification-db-secrets
                  key: database_url
          volumeMounts:
            - name: shared-migrations
              mountPath: /migrations
      containers:
        - name: notification-service
          image: vroom-mvp/notification-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "postgres.platform.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "notification_svc"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-db-secrets
                  key: password
            - name: DB_NAME
              value: "vroom"
            - name: REDIS_ADDR
              value: "redis.platform.svc.cluster.local:6379"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
      volumes:
        - name: shared-migrations
          emptyDir: {}
