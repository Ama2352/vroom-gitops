apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: copy-migrations
          image: vroom-mvp/notification-service:latest
          command: ["sh", "-c", "cp -r /app/migrations/* /shared-migrations/"]
          volumeMounts:
            - name: shared-migrations
              mountPath: /shared-migrations
        - name: migrate
          image: migrate/migrate:v4.16.2
          args:
            - "-path=file:///shared-migrations/"
            - "-database=postgres://notification_svc:vroom_dev@postgres.platform.svc.cluster.local:5432/vroom?sslmode=disable&search_path=notifications&x-migrations-table=notification_migrations"
            - "up"
          volumeMounts:
            - name: shared-migrations
              mountPath: /shared-migrations
      containers:
        - name: notification-service
          image: vroom-mvp/notification-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "postgres.platform.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "notification_svc"
            - name: DB_PASSWORD
              value: "vroom_dev"
            - name: DB_NAME
              value: "vroom"
            - name: REDIS_ADDR
              value: "redis.platform.svc.cluster.local:6379"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
      volumes:
        - name: shared-migrations
          emptyDir: {}
