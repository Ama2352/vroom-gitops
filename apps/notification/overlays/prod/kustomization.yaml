apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml
  - secrets/notification-db-secrets.yaml   # SealedSecret for vroom-prod namespace

namespace: vroom-prod

patches:
  - path: patches/resource_limits.yaml
  - path: patches/replicas.yaml

labels:
  - pairs:
      env: prod

images:
  - name: vroom-mvp/notification-service
    newName: ama2352/vroom-mvp-notification-service
    newTag: latest
