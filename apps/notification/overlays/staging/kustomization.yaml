apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml
  - secrets/notification-db-secrets.yaml   # SealedSecret for vroom-staging namespace

namespace: vroom-staging

patches:
  - path: patches/resource_limits.yaml

labels:
  - pairs:
      env: staging

images:
  - name: vroom-mvp/notification-service
    newName: ama2352/vroom-mvp-notification-service
    newTag: latest
