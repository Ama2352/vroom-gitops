apiVersion: apps/v1
kind: Deployment
metadata:
  name: ride-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ride-service
  template:
    metadata:
      labels:
        app: ride-service
    spec:
      containers:
        - name: ride-service
          image: vroom-mvp/ride-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "postgres.platform.svc.cluster.local"
            - name: REDIS_ADDR
              value: "redis.platform.svc.cluster.local:6379"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
