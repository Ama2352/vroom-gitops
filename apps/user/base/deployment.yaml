apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
        # Step 1: Copy migrations from YOUR image to a shared volume
        - name: copy-migrations
          image: vroom-mvp/user-service:latest
          command: ["sh", "-c", "cp -av /app/migrations/. /migrations/"]
          volumeMounts:
            - name: shared-migrations
              mountPath: /migrations
        - name: migrate
          image: migrate/migrate:v4.16.2
          command: ["sh", "-c"]
          args:
            - "ls -la /migrations && /migrate -path file:///migrations -database \"$DATABASE_URL\" up"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: user-db-secrets
                  key: database_url
          volumeMounts:
            - name: shared-migrations
              mountPath: /migrations
      containers:
        - name: user-service
          image: vroom-mvp/user-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "postgres.platform.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "user_svc"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-db-secrets
                  key: password
            - name: DB_NAME
              value: "vroom"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
      volumes:
        - name: shared-migrations
          emptyDir: {}
