apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vroom-apps-dev
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://gitlab.com/vroom-app/gitops.git
        revision: HEAD
        directories:
          - path: apps/*
          - path: apps/ai-reporter   # ai-reporter has no overlays structure; managed as standalone App
            exclude: true
  template:
    metadata:
      name: 'vroom-dev-{{path.basename}}'
      labels:
        env: dev
        kargo.akuity.io/stage: dev
    spec:
      project: default
      source:
        repoURL: https://gitlab.com/vroom-app/gitops.git
        targetRevision: HEAD
        path: '{{path}}/overlays/dev'
      destination:
        server: https://kubernetes.default.svc
        namespace: vroom-dev
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
