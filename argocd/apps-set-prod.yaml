apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vroom-apps-prod
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://gitlab.com/vroom-app/gitops.git
        revision: HEAD
        directories:
          - path: apps/*
          - path: apps/ai-reporter
            exclude: true
  template:
    metadata:
      name: 'vroom-prod-{{path.basename}}'
      labels:
        env: prod
        kargo.akuity.io/stage: prod
    spec:
      project: default
      source:
        repoURL: https://gitlab.com/vroom-app/gitops.git
        targetRevision: HEAD
        path: '{{path}}/overlays/prod'
      destination:
        server: https://kubernetes.default.svc
        namespace: vroom-prod
      syncPolicy:
        automated:
          prune: false      # manual sync for prod — ArgoCD won't auto-apply prod changes
          selfHeal: false
        syncOptions:
          - CreateNamespace=true
