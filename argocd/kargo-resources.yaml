apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vroom-kargo-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/vroom-app/gitops.git
    targetRevision: HEAD
    path: kargo
  destination:
    server: https://kubernetes.default.svc
    namespace: vroom
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
