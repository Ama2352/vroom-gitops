apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vroom-infrastructure
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    kargo.akuity.io/authorized-stage: vroom:platform
spec:
  project: default
  source:
    repoURL: https://github.com/Ama2352/vroom-gitops.git
    targetRevision: HEAD
    path: platform
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
