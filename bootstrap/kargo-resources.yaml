apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vroom-kargo-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ama2352/vroom-gitops.git
    targetRevision: HEAD
    path: delivery
  destination:
    server: https://kubernetes.default.svc
    namespace: vroom
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
