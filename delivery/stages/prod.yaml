apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: vroom
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: vroom-warehouse
      sources:
        stages: [dev] # only Freight that passed dev verification
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/Ama2352/vroom-gitops.git
            checkout:
              - branch: main
                path: ./repo
        - uses: kustomize-set-image
          config:
            path: repo/apps/user/overlays/prod
            images:
              - image: vroom-mvp/user-service
                newName: ghcr.io/ama2352/vroom-mvp-user-service
                tag: ${{ imageFrom("ghcr.io/ama2352/vroom-mvp-user-service").Tag }}
        - uses: kustomize-set-image
          config:
            path: repo/apps/ride/overlays/prod
            images:
              - image: vroom-mvp/ride-service
                newName: ghcr.io/ama2352/vroom-mvp-ride-service
                tag: ${{ imageFrom("ghcr.io/ama2352/vroom-mvp-ride-service").Tag }}
        - uses: kustomize-set-image
          config:
            path: repo/apps/dispatch/overlays/prod
            images:
              - image: vroom-mvp/dispatch-service
                newName: ghcr.io/ama2352/vroom-mvp-dispatch-service
                tag: ${{ imageFrom("ghcr.io/ama2352/vroom-mvp-dispatch-service").Tag }}
        - uses: kustomize-set-image
          config:
            path: repo/apps/notification/overlays/prod
            images:
              - image: vroom-mvp/notification-service
                newName: ghcr.io/ama2352/vroom-mvp-notification-service
                tag: ${{ imageFrom("ghcr.io/ama2352/vroom-mvp-notification-service").Tag }}
        - uses: kustomize-set-image
          config:
            path: repo/apps/frontend/overlays/prod
            images:
              - image: vroom-mvp/frontend
                newName: ghcr.io/ama2352/vroom-mvp-frontend
                tag: ${{ imageFrom("ghcr.io/ama2352/vroom-mvp-frontend").Tag }}
        - uses: git-commit
          as: commit
          config:
            path: ./repo
            message: "chore(gitops): promote images to prod"
        - uses: git-push
          config:
            path: ./repo
        - uses: argocd-update
          config:
            apps:
              - name: vroom-prod-user
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredRevision: ${{ outputs.commit.commit }}
              - name: vroom-prod-ride
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredRevision: ${{ outputs.commit.commit }}
              - name: vroom-prod-dispatch
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredRevision: ${{ outputs.commit.commit }}
              - name: vroom-prod-notification
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredRevision: ${{ outputs.commit.commit }}
              - name: vroom-prod-frontend
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredRevision: ${{ outputs.commit.commit }}
  # Prod requires human approval via `kargo approve` before promotion runs.
  # Verification fires automatically after the promotion completes.
  # A CRIT result fires Slack alerts but does NOT auto-rollback.
  verification:
    analysisTemplates:
      - name: prometheus-checks
    args:
      - name: target-namespace
        value: vroom-prod
