apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2" # Install before Kargo
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    targetRevision: 2.37.2
    helm:
      values: |
        dashboard:
          enabled: true
        installCRDs: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts
  # Kubernetes auto-populates preserveUnknownFields: false on CRDs at storage time.
  # The Helm-rendered CRD manifests don't include this field, causing a perpetual diff.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
