apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # install before app stages
spec:
  project: default
  source:
    repoURL: ghcr.io/akuity/kargo-charts # OCI registry — charts.kargo.akuity.io does not exist
    chart: kargo
    targetRevision: 1.10.3
    helm:
      valuesObject:
        controller:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 300Mi
        api:
          service:
            type: NodePort
            nodePort: 30088
          secret:
            name: kargo-admin-secret
          resources:
            requests:
              cpu: 30m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          adminAccount:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: vroom-kargo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
