apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:9.5.2
          ports:
            - containerPort: 3000
          resources:
            limits:
              memory: 256Mi
            requests:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: platform
spec:
  ports:
    - port: 3000
  selector:
    app: grafana
