apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: monitoring
spec:
  ingressClassName: traefik
  rules:
    - host: ""
      http:
        paths:
          # Grafana: serve_from_sub_path=true + root_url=/grafana/ set in metrics/prometheus-values.yaml
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80

          # Prometheus: routePrefix=/prometheus set in metrics/prometheus-values.yaml
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-prometheus
                port:
                  number: 9090

          # AlertManager: routePrefix=/alertmanager set in metrics/prometheus-values.yaml
          - path: /alertmanager
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-alertmanager
                port:
                  number: 9093

          # Tempo UI is in a separate Ingress object (traces/tempo-ingress.yaml) because it needs
          # a strip-prefix Middleware annotation that cannot be applied per-path in a shared Ingress
