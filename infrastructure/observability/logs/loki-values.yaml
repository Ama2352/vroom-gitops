# Loki Stack Values
# Single-binary mode with Promtail DaemonSet
# Tuned for 9GB K3s cluster — 24h retention to minimize disk usage

loki:
  enabled: true
  config:
    auth_enabled: false

    limits_config:
      retention_period: 24h
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 8

    chunk_store_config:
      max_look_back_period: 24h

    table_manager:
      retention_deletes_enabled: true
      retention_period: 24h

    storage_config:
      filesystem:
        directory: /data/loki/chunks

    schema_config:
      configs:
        - from: "2024-01-01"
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki-stack:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - cri: {}
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

grafana:
  enabled: false   # managed by kube-prometheus-stack
