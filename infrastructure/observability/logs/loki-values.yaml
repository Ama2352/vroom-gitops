# Loki Stack Values
# Single-binary mode with Promtail DaemonSet
# Tuned for 9GB K3s cluster — 24h retention

loki:
  enabled: true
  config:
    auth_enabled: false

    common:
      ring:
        kvstore:
          store: inmemory
        instance_addr: 127.0.0.1

    schema_config:
      configs:
        - from: "2024-01-01"
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/boltdb-shipper-active
        cache_location: /data/loki/boltdb-shipper-cache
        cache_ttl: 24h
        shared_store: filesystem
      filesystem:
        directory: /data/loki/chunks

    limits_config:
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 8
      retention_period: 24h

    compactor:
      working_directory: /data/loki/compactor
      shared_store: filesystem
      retention_enabled: true
      retention_delete_delay: 2h

    ruler:
      storage:
        type: local
        local:
          directory: /data/loki/rules
      rule_path: /data/loki/rules-temp
      alertmanager_url: http://kube-prometheus-stack-alertmanager.monitoring:9093
      ring:
        kvstore:
          store: inmemory

    # table_manager intentionally omitted — compactor handles retention for boltdb-shipper;
    # having both enabled simultaneously causes conflicts and prevents startup

  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi



promtail:
  enabled: true
  config:
    clients:
      - url: http://loki-stack:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - cri: {}
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

grafana:
  enabled: false   # managed by kube-prometheus-stack

