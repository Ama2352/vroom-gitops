apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: monitoring
  annotations:
    # Use your existing Traefik middleware if configured
    # traefik.ingress.kubernetes.io/router.middlewares: platform-auth-middleware@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    # Grafana - accessible at /grafana
    - host: ""
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80

          # Prometheus - accessible at /prometheus
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-prometheus
                port:
                  number: 9090

          # AlertManager - accessible at /alertmanager
          - path: /alertmanager
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-alertmanager
                port:
                  number: 9093
