# Traefik Middleware: strips /tempo prefix before forwarding to Jaeger Query UI.
# Tempo query serves assets from / (root); without stripping, JS/CSS loads fail.
# Kept in a separate Ingress (not the shared monitoring ingress) because Traefik
# middleware annotations apply to the whole IngressRoute, not individual path rules.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-tempo-prefix
  namespace: monitoring
spec:
  stripPrefix:
    prefixes:
      - /tempo

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tempo-ingress
  namespace: monitoring
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: monitoring-strip-tempo-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /tempo
            pathType: Prefix
            backend:
              service:
                name: tempo-query
                port:
                  number: 16686
