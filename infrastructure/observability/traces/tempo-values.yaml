# Tempo Values — single-binary, local filesystem storage
# Tuned for 9GB K3s cluster — 24h trace retention

tempo:
  retention: 24h

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
    jaeger:
      protocols:
        thrift_http:
          endpoint: "0.0.0.0:14268"

  persistence:
    enabled: true
    storageClassName: local-path
    size: 1Gi

# Jaeger-compatible query UI
# Sub-path routing (/tempo) is handled by a Traefik strip-prefix Middleware defined in
# traces/tempo-ingress.yaml — no --query.base-path flag needed (not supported in this version)
tempoQuery:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
