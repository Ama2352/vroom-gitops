apiVersion: apps/v1
kind: Deployment
metadata:
  name: vroom-traffic-generator
  namespace: vroom-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      containers:
      - name: generator
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          apk add --no-cache curl;
          echo "Starting traffic generation...";
          while true; do
            # User Service
            curl -s -o /dev/null "http://user-service:8080/health" || true;
            curl -s -o /dev/null "http://user-service:8080/v1/auth/health" || true;
            
            # Ride Service
            curl -s -o /dev/null "http://ride-service:8080/healthz" || true;
            curl -s -o /dev/null "http://ride-service:8080/v1/trips/health" || true;
            
            # Dispatch Service
            curl -s -o /dev/null "http://dispatch-service:8080/healthz" || true;
            curl -s -o /dev/null "http://dispatch-service:8080/readyz" || true;
            
            # Notification Service
            curl -s -o /dev/null "http://notification-service:8080/health" || true;
            
            # Sleep to regulate traffic rate
            sleep 2;
          done
