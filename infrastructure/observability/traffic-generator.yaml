apiVersion: apps/v1
kind: Deployment
metadata:
  name: vroom-traffic-generator
  namespace: vroom-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      containers:
      - name: generator
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          apk add --no-cache curl;
          echo "Starting traffic generation...";
          while true; do
            for svc in user-service ride-service dispatch-service notification-service; do
              # Hit health check
              curl -s -o /dev/null "http://$svc:8080/health" || echo "Failed to hit $svc";
              # Generate some business-like traffic
              curl -s -o /dev/null "http://$svc:8080/v1/health" || true;
              # Add some delay between bursts
              sleep 1;
            done
            sleep 2;
          done
