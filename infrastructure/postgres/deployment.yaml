apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: vroom
            - name: POSTGRES_USER
              value: vroom
            - name: POSTGRES_PASSWORD
              value: vroom_dev
            # Correctly mapped to your service secret names and keys
            - name: USER_SVC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-db-secrets
                  key: password
            - name: RIDE_SVC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ride-db-secrets
                  key: password
            - name: NOTIFICATION_SVC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-db-secrets
                  key: password
            - name: DISPATCH_SVC_PASSWORD
              value: "vroom_dev"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            limits:
              memory: 256Mi
            requests:
              memory: 128Mi
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-scripts
          configMap:
            name: postgres-init
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: platform
spec:
  ports:
    - port: 5432
  selector:
    app: postgres

