apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarqube
  namespace: argocd
spec:
  project: default
  sources:
    # SonarQube Community Edition Helm chart from SonarSource official registry.
    # To find the latest version: helm repo add sonarqube https://SonarSource.github.io/helm-chart-sonarqube
    #                             helm search repo sonarqube/sonarqube --versions | head -5
    - chart: sonarqube
      repoURL: https://SonarSource.github.io/helm-chart-sonarqube
      targetRevision: "10.6.0+3033"
      helm:
        releaseName: sonarqube
        valueFiles:
          - $values/infrastructure/sonarqube/sonarqube-values.yaml
    - repoURL: https://gitlab.com/vroom-app/gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
