# Strip /sonarqube prefix before forwarding — SonarQube runs at root (no sonarWebContext).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-sonarqube-prefix
  namespace: sonarqube
spec:
  stripPrefix:
    prefixes:
      - /sonarqube

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonarqube-ingress
  namespace: sonarqube
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: sonarqube-strip-sonarqube-prefix@kubernetescrd
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /sonarqube
            pathType: Prefix
            backend:
              service:
                name: sonarqube-sonarqube
                port:
                  number: 9000
