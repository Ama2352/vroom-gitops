# SonarQube Community Edition — tuned for K3s 10 GB RAM budget.
# Exposed via NodePort 30090 (direct) and Traefik /sonarqube path (with strip-prefix).
# Runs at root path — no sonarWebContext needed.

jvmOpts: "-Xmx512m -Xms128m -XX:+UseContainerSupport"
jvmCeOpts: "-Xmx256m -Xms64m -XX:+UseContainerSupport"

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "800m"
    memory: "1.5Gi"

# Elasticsearch (embedded) requires vm.max_map_count=524288.
# initContainer sets it at pod startup — requires privileged=true.
# The sonarqube namespace has pod-security.kubernetes.io/enforce: privileged to allow this.
initSysctl:
  enabled: true
  vmMaxMapCount: 524288
  securityContext:
    privileged: true
    runAsUser: 0

persistence:
  enabled: true
  size: 2Gi

# Bundled Bitnami PostgreSQL — isolated from the shared platform/postgres instance.
postgresql:
  enabled: true
  image:
    repository: bitnami/postgresql
    tag: "latest"
  auth:
    username: sonarqube
    password: sonarqube
    database: sonarqube
  primary:
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
    persistence:
      size: 2Gi

nginx:
  enabled: false

# NodePort 30090 for direct access: http://192.168.25.133:30090
# Traefik ingress at /sonarqube also works (strip-prefix middleware in sonarqube-ingress.yaml)
service:
  type: NodePort
  nodePort: 30090

prometheusMonitoring:
  podMonitor:
    enabled: false
