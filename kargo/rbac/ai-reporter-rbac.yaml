# RBAC for the ai-reporter Kargo AnalysisRun Job.
# The Job runs in the vroom namespace but needs to read Deployments + Pods
# from vroom-dev, vroom-staging, and vroom-prod to collect deploy context.
#
# Minimal footprint: read-only get/list on deployments and pods only.
# No secrets, configmaps, services, or write access of any kind.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-reporter
  namespace: vroom
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-reporter-reader
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-reporter-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-reporter-reader
subjects:
  - kind: ServiceAccount
    name: ai-reporter
    namespace: vroom
