apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: vroom
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: vroom-warehouse
      sources:
        stages: [staging]   # only Freight that passed staging verification
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/Ama2352/vroom-gitops.git
            checkout:
              - branch: main
                path: ./repo
        - uses: kustomize-set-image
          config:
            path: repo/apps/user/overlays/prod
            images:
              - image: ama2352/vroom-mvp-user-service
        - uses: kustomize-set-image
          config:
            path: repo/apps/ride/overlays/prod
            images:
              - image: ama2352/vroom-mvp-ride-service
        - uses: kustomize-set-image
          config:
            path: repo/apps/dispatch/overlays/prod
            images:
              - image: ama2352/vroom-mvp-dispatch-service
        - uses: kustomize-set-image
          config:
            path: repo/apps/notification/overlays/prod
            images:
              - image: ama2352/vroom-mvp-notification-service
        - uses: kustomize-set-image
          config:
            path: repo/apps/frontend/overlays/prod
            images:
              - image: ama2352/vroom-mvp-frontend
        - uses: git-commit
          as: commit
          config:
            path: ./repo
            message: "chore(gitops): promote images to prod"
        - uses: git-push
          config:
            path: ./repo
        - uses: argocd-update
          config:
            apps:
              - name: vroom-prod-user
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredCommitFromStep: commit
              - name: vroom-prod-ride
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredCommitFromStep: commit
              - name: vroom-prod-dispatch
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredCommitFromStep: commit
              - name: vroom-prod-notification
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredCommitFromStep: commit
              - name: vroom-prod-frontend
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredCommitFromStep: commit
  # No verification block — prod requires human approval via Kargo UI/CLI
  # The staging AI report posted to Slack serves as the human-readable gate
