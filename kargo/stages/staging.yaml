apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: vroom
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: vroom-warehouse
      sources:
        stages: [dev]   # only promote Freight that passed dev verification
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/Ama2352/vroom-gitops.git
            checkout:
              - branch: main
                path: ./repo
        - uses: kustomize-set-image
          config:
            path: repo/apps/user/overlays/staging
            images:
              - image: ama2352/vroom-mvp-user-service
        - uses: kustomize-set-image
          config:
            path: repo/apps/ride/overlays/staging
            images:
              - image: ama2352/vroom-mvp-ride-service
        - uses: kustomize-set-image
          config:
            path: repo/apps/dispatch/overlays/staging
            images:
              - image: ama2352/vroom-mvp-dispatch-service
        - uses: kustomize-set-image
          config:
            path: repo/apps/notification/overlays/staging
            images:
              - image: ama2352/vroom-mvp-notification-service
        - uses: kustomize-set-image
          config:
            path: repo/apps/frontend/overlays/staging
            images:
              - image: ama2352/vroom-mvp-frontend
        - uses: git-commit
          as: commit
          config:
            path: ./repo
            message: "chore(gitops): promote images to staging"
        - uses: git-push
          config:
            path: ./repo
        - uses: argocd-update
          config:
            apps:
              - name: vroom-staging-user
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredRevision: ${{ outputs.commit.commit }}
              - name: vroom-staging-ride
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredRevision: ${{ outputs.commit.commit }}
              - name: vroom-staging-dispatch
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredRevision: ${{ outputs.commit.commit }}
              - name: vroom-staging-notification
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredRevision: ${{ outputs.commit.commit }}
              - name: vroom-staging-frontend
                namespace: argocd
                sources:
                  - repoURL: https://github.com/Ama2352/vroom-gitops.git
                    desiredRevision: ${{ outputs.commit.commit }}
  verification:
    analysisTemplates:
      - name: prometheus-checks
      - name: ai-health-check
    args:
      - name: target-namespace
        value: vroom-staging
