apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: vroom-warehouse
  namespace: vroom
spec:
  subscriptions:
    # Git subscriber: detects manual configuration changes to overlays/dev.
    # CI-driven deployment to dev is now handled automatically by Kargo.
    - git:
        repoURL: https://github.com/Ama2352/vroom-gitops.git
        branch: main
        commitSelectionStrategy: NewestFromBranch
        discoveryLimit: 20
        includePaths:
          - "regex:^apps/[^/]+/overlays/dev/.*$"
    # Image subscribers: detect new image tags pushed to DockerHub by CI.
    - image:
        repoURL: docker.io/ama2352/vroom-mvp-user-service
        imageSelectionStrategy: SemVer
        semverConstraint: "^1.0.0-0"
        discoveryLimit: 20
    - image:
        repoURL: docker.io/ama2352/vroom-mvp-ride-service
        imageSelectionStrategy: SemVer
        semverConstraint: "^1.0.0-0"
        discoveryLimit: 20
    - image:
        repoURL: docker.io/ama2352/vroom-mvp-dispatch-service
        imageSelectionStrategy: SemVer
        semverConstraint: "^1.0.0-0"
        discoveryLimit: 20
    - image:
        repoURL: docker.io/ama2352/vroom-mvp-notification-service
        imageSelectionStrategy: SemVer
        semverConstraint: "^1.0.0-0"
        discoveryLimit: 20
    - image:
        repoURL: docker.io/ama2352/vroom-mvp-frontend
        imageSelectionStrategy: SemVer
        semverConstraint: "^1.0.0-0"
        discoveryLimit: 20
