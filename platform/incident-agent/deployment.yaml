apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-agent
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-agent
  template:
    metadata:
      labels:
        app: incident-agent
    spec:
      containers:
      - name: agent
        image: vroom-mvp/incident-agent:latest
        ports:
        - containerPort: 5002
        env:
        - name: REDIS_URL
          value: "redis://redis.platform.svc.cluster.local:6379"
        - name: KUBECTL_EXECUTOR_URL
          value: "http://kubectl-executor.monitoring.svc.cluster.local:5001"
        - name: PROMETHEUS_URL
          value: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/prometheus/api/v1/query"
        - name: LOKI_URL
          value: "http://loki-stack.monitoring.svc.cluster.local:3100/loki/api/v1/query_range"
        - name: TEMPO_URL
          value: "http://tempo.monitoring.svc.cluster.local:3100"
        - name: GITHUB_REPO
          value: "Ama2352/vroom-services"
        - name: DOCS_DIR
          value: "/docs"
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: openrouter-secret
              key: api-key
              optional: true
        - name: EXECUTOR_API_KEY
          valueFrom:
            secretKeyRef:
              name: kubectl-executor-secret
              key: EXECUTOR_API_KEY
        resources:
          requests:
            memory: "200Mi"
            cpu: "100m"
          limits:
            memory: "400Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: incident-agent
  namespace: monitoring
spec:
  selector:
    app: incident-agent
  ports:
  - port: 5002
    targetPort: 5002
