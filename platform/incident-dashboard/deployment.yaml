apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-dashboard
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-dashboard
  template:
    metadata:
      labels:
        app: incident-dashboard
    spec:
      containers:
        - name: dashboard
          image: vroom-mvp/incident-dashboard:latest
          ports:
            - containerPort: 5173
          env:
            - name: VITE_AGENT_URL
              value: "http://192.168.242.10:30080"
          resources:
            requests:
              memory: "150Mi"
              cpu: "50m"
            limits:
              memory: "300Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: incident-dashboard
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: incident-dashboard
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30079
