apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # install before app stages
spec:
  project: default
  source:
    repoURL: ghcr.io/akuity/kargo-charts # OCI registry — charts.kargo.akuity.io does not exist
    chart: kargo
    targetRevision: 1.10.3
    helm:
      valuesObject:
        api:
          rollouts:
            integrationEnabled: true
            logs:
              enabled: true
              urlTemplate: "http://loki-stack.monitoring.svc.cluster.local:3100/loki/api/v1/query_range?query=%7Bnamespace%3D%22${{jobNamespace}}%22%7D%20%7C%3D%20%22${{jobName}}%22&limit=1000"
          service:
            type: NodePort
            nodePort: 30088
          secret:
            name: kargo-admin-secret
          resources:
            requests:
              cpu: 30m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          adminAccount:
            enabled: true
        controller:
          rollouts:
            integrationEnabled: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 300Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: vroom-kargo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
