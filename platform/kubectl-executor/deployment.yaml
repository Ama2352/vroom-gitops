apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubectl-executor-sa
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubectl-executor-reader
rules:
- apiGroups: [""]
  resources: ["pods", "events"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubectl-executor-reader-binding
subjects:
- kind: ServiceAccount
  name: kubectl-executor-sa
  namespace: monitoring
roleRef:
  kind: ClusterRole
  name: kubectl-executor-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubectl-executor
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubectl-executor
  template:
    metadata:
      labels:
        app: kubectl-executor
    spec:
      serviceAccountName: kubectl-executor-sa
      containers:
      - name: executor
        image: vroom-mvp/kubectl-executor:latest
        ports:
        - containerPort: 5001
        envFrom:
        - secretRef:
            name: kubectl-executor-secret
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: kubectl-executor
  namespace: monitoring
spec:
  selector:
    app: kubectl-executor
  ports:
  - port: 5001
    targetPort: 5001
