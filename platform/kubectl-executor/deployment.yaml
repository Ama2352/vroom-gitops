apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubectl-executor-sa
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubectl-executor-reader
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "events", "services", "nodes",
               "configmaps", "endpoints", "namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubectl-executor-reader-binding
subjects:
- kind: ServiceAccount
  name: kubectl-executor-sa
  namespace: monitoring
roleRef:
  kind: ClusterRole
  name: kubectl-executor-reader
  apiGroup: rbac.authorization.k8s.io
---
# Namespace-scoped write permissions — one Role+RoleBinding per app namespace.
# deployments/scale (update): only changes spec.replicas — cannot modify image/env.
# deployments (patch): needed for rollout restart (patches pod template annotation).
# Scoped to vroom-* namespaces only — executor cannot touch monitoring/kube-system.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubectl-executor-writer
  namespace: vroom-dev
rules:
- apiGroups: ["apps"]
  resources: ["deployments/scale"]
  verbs: ["update"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubectl-executor-writer-binding
  namespace: vroom-dev
subjects:
- kind: ServiceAccount
  name: kubectl-executor-sa
  namespace: monitoring
roleRef:
  kind: Role
  name: kubectl-executor-writer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubectl-executor-writer
  namespace: vroom-staging
rules:
- apiGroups: ["apps"]
  resources: ["deployments/scale"]
  verbs: ["update"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubectl-executor-writer-binding
  namespace: vroom-staging
subjects:
- kind: ServiceAccount
  name: kubectl-executor-sa
  namespace: monitoring
roleRef:
  kind: Role
  name: kubectl-executor-writer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubectl-executor-writer
  namespace: vroom-prod
rules:
- apiGroups: ["apps"]
  resources: ["deployments/scale"]
  verbs: ["update"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubectl-executor-writer-binding
  namespace: vroom-prod
subjects:
- kind: ServiceAccount
  name: kubectl-executor-sa
  namespace: monitoring
roleRef:
  kind: Role
  name: kubectl-executor-writer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubectl-executor
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubectl-executor
  template:
    metadata:
      labels:
        app: kubectl-executor
    spec:
      serviceAccountName: kubectl-executor-sa
      containers:
      - name: executor
        image: vroom-mvp/kubectl-executor:latest
        ports:
        - containerPort: 5001
        envFrom:
        - secretRef:
            name: kubectl-executor-secret
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: kubectl-executor
  namespace: monitoring
spec:
  selector:
    app: kubectl-executor
  ports:
  - port: 5001
    targetPort: 5001
