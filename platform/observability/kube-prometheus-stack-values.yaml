# Kube-Prometheus-Stack Values
# Optimized for 9GB K3s cluster (3 nodes × 3GB RAM)
# Resource allocation targets: ~25% cluster usage (~2.3GB)

prometheus:
  prometheusSpec:
    # Resource requests/limits for memory-constrained environment
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # Data retention: 7 days fits 1GB TSDB storage
    retention: 7d

    # Compress WAL to reduce disk I/O
    walCompression: true

    # Storage configuration (adjust size based on your VMs)
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path # Default k3s storage class
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    # Auto-discover ServiceMonitors and PrometheusRules from all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    ruleSelector: {}
    ruleNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false

    # Pod discovery: scrape all pods with prometheus annotations
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}

    # Adjust scrape interval based on cluster size
    scrapeInterval: 30s
    evaluationInterval: 30s

    # Subpath configuration for Ingress
    externalUrl: "http://localhost/prometheus"
    routePrefix: "/prometheus"

  additionalPrometheusRulesMap:
    vroom-alerts:
      groups:
        - name: vroom-services
          interval: 30s
          rules:
            # ==================== Node Alerts ====================
            - alert: NodeMemoryHigh
              expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
              for: 5m
              labels:
                severity: warning
                component: node
              annotations:
                summary: "High memory usage on {{ $labels.node }}"
                description: "Node {{ $labels.node }} memory usage is {{ $value | humanizePercentage }}. Available memory is low."

            # ==================== Kubernetes Cluster Alerts ====================
            - alert: KubernetesPodCrashLooping
              expr: rate(kube_pod_container_status_restarts_total[15m]) > 0.1
              for: 5m
              labels:
                severity: warning
                component: kubernetes
              annotations:
                summary: "Kubernetes pod crash looping (instance {{ $labels.pod }})"
                description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping. Restart rate: {{ $value }} restarts/min"

            - alert: KubernetesPodNotHealthy
              expr: min_over_time(sum by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"})[15m:1m]) > 0
              for: 15m
              labels:
                severity: warning
                component: kubernetes
              annotations:
                summary: "Kubernetes pod not healthy (instance {{ $labels.pod }})"
                description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-running state for more than 15 minutes."

            # ==================== Application Alerts (Vroom Services) ====================
            - alert: ServiceDown
              expr: up{job=~"ride.*|user.*|dispatch.*|notification.*"} == 0
              for: 2m
              labels:
                severity: critical
                component: application
              annotations:
                summary: "Service {{ $labels.job }} is DOWN"
                description: "Service {{ $labels.job }} in namespace {{ $labels.namespace }} has been unreachable for 2 minutes."

grafana:
  # Grafana UI credentials
  adminPassword: "ChangeMeToSecurePassword!"

  additionalDataSources:
    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3100
      isDefault: false
      version: 1
      editable: true
      jsonData:
        httpMethod: GET

  # Subpath configuration
  grafana.ini:
    server:
      domain: ""
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      serve_from_sub_path: true
    auth.anonymous:
      enabled: true
      org_name: "Main Org."
      org_role: "Admin"

  # Persistence for dashboards and datasources
  persistence:
    enabled: true
    type: pvc
    size: 1Gi
    storageClassName: local-path

  # Resource constraints
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 192Mi

  # Traefik ingress configuration
  ingress:
    enabled: false # We'll create separate ingress file
    # ingressClassName: traefik
    # path: /grafana
    # pathType: Prefix

alertmanager:
  alertmanagerSpec:
    # Subpath configuration
    externalUrl: "http://localhost/alertmanager"
    routePrefix: "/alertmanager"

    # Keep AlertManager lightweight
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

    # Storage for alerts
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

  config:
    global:
      resolve_timeout: 5m
      slack_api_url: 'YOUR_SLACK_WEBHOOK_URL_HERE'

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'slack-notifications'
      routes:
        - match:
            severity: critical
          receiver: 'slack-notifications'
          group_wait: 0s
          continue: true  # also send to n8n for critical alerts
        - receiver: 'n8n-incident-agent'
          match:
            severity: warning
          group_wait: 30s
          repeat_interval: 4h

    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - channel: '#vroom-alerts'
            send_resolved: true
            title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | upper }}] {{ .GroupLabels.alertname }}'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }}
              *Severity:* {{ .Labels.severity }}
              *Details:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
      - name: 'n8n-incident-agent'
        webhook_configs:
          - url: 'http://n8n.monitoring.svc.cluster.local:5678/webhook/vroom-alert'
            send_resolved: false

nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheusOperator:
  # The operator manages ServiceMonitor and PrometheusRule CRDs
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# K3s uses different control plane exposure; disable standard metrics
kubelet:
  enabled: true
  namespace: kube-system

kubeControllerManager:
  enabled: false # K3s doesn't expose this via standard metrics

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

# Optional: Disable unused dashboards to save storage
grafana-dashboards:
  dashboards:
    # Keep only essential dashboards
    # Adjust based on your needs
