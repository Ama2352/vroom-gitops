apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-tempo-prefix
  namespace: monitoring
spec:
  stripPrefix:
    prefixes:
      - /tempo
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tempo-ingress
  namespace: monitoring
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.priority: "100"
    traefik.ingress.kubernetes.io/router.middlewares: monitoring-strip-tempo-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /tempo
            pathType: Prefix
            backend:
              service:
                name: tempo
                port:
                  number: 3100
