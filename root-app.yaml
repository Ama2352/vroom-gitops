apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vroom-platform-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/vroom-app/gitops.git
    targetRevision: HEAD
    path: argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
