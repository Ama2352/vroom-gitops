apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Centralized SealedSecrets — managed by the vroom-secrets ArgoCD Application.
# Deployed at sync wave -2 (before infra at -1, before apps at 0).
# All secrets use strict scope (bound to metadata.name + metadata.namespace).
# Structure mirrors vroom-infra/.secrets/<namespace>/<name>.yaml
#
# PLACEHOLDERS (must be sealed before enabling):
#   - vroom/ghcr-creds.yaml
#   - monitoring/n8n-sealed-secret.yaml
#   - monitoring/kubectl-executor-secret.yaml

resources:
  # --- vroom-dev ---
  - vroom-dev/user-db-secrets.yaml
  - vroom-dev/ride-db-secrets.yaml
  - vroom-dev/notification-db-secrets.yaml
  # --- vroom-staging ---
  - vroom-staging/user-db-secrets.yaml
  - vroom-staging/ride-db-secrets.yaml
  - vroom-staging/notification-db-secrets.yaml
  # --- vroom-prod ---
  - vroom-prod/user-db-secrets.yaml
  - vroom-prod/ride-db-secrets.yaml
  - vroom-prod/notification-db-secrets.yaml
  # --- platform ---
  - platform/user-db-secrets.yaml
  - platform/ride-db-secrets.yaml
  - platform/notification-db-secrets.yaml
  # --- monitoring ---
  - monitoring/alertmanager-slack-secret.yaml
  # --- vroom-kargo ---
  - vroom-kargo/kargo-admin-password.yaml
  # --- vroom ---
  - vroom/gitops-git-creds.yaml
  # Placeholders (uncomment after sealing):
  # - vroom/ghcr-creds.yaml
  # - monitoring/n8n-sealed-secret.yaml
  # - monitoring/kubectl-executor-secret.yaml
