# PLACEHOLDER — this file must be generated via Ansible seal-secrets.yml.
# Do NOT commit a real API key here.
#
# To seal:
# 1. Add to vroom-infra/ansible/vars/secrets.yml:
#      groq_api_key: "<your-groq-api-key>"
# 2. Run: vagrant provision k3s-server --provision-with seal-secrets.yml
# 3. Copy the generated SealedSecret here and commit.
#
# Until sealed, the pod runs with GROQ_API_KEY="" and falls back to OpenRouter.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: groq-secret
  namespace: monitoring
spec:
  encryptedData:
    api-key: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      creationTimestamp: null
      name: groq-secret
      namespace: monitoring
    type: Opaque
