# On-cluster Job to run the ai-reporter scenario test suite.
# Requires ai-reporter-secret to be sealed in the monitoring namespace.
#
# Usage:
#   kubectl apply -f vroom-gitops/testing/run-reporter-test.yaml
#   kubectl logs -n monitoring job/ai-reporter-scenario-test -f
#   kubectl delete job/ai-reporter-scenario-test -n monitoring  # cleanup
#
# Set RUN_FULL_GEMINI_TESTS=0 to run in MOCK_GEMINI mode (no API calls).
apiVersion: batch/v1
kind: Job
metadata:
  name: ai-reporter-scenario-test
  namespace: monitoring
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: test-runner
          image: docker.io/ama2352/vroom-mvp-ai-reporter:latest
          imagePullPolicy: Always
          command: ["python", "skill/scripts/test_scenarios.py"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-reporter-secret
                  key: gemini-api-key
            - name: RUN_FULL_GEMINI_TESTS
              value: "1"
            - name: PROMETHEUS_URL
              value: "http://kube-prometheus-stack-prometheus.monitoring:9090/prometheus"
            - name: LOKI_URL
              value: "http://loki-stack.monitoring:3100"
            - name: TARGET_NAMESPACE
              value: "vroom-dev"
