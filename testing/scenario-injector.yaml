# Scenario injector for ai-reporter testing.
# Replaces / supplements the basic traffic-generator.yaml with multi-mode simulation.
#
# Switch scenario at runtime:
#   kubectl set env deployment/vroom-scenario-injector SCENARIO=error-logs -n vroom-dev
#
# SCENARIO values:
#   normal      Baseline healthy traffic (health endpoint polling)
#   error-logs  Emits ERROR log lines → Loki error_logs accumulate
#   http-errors Hits invalid HTTP endpoints → 4xx responses
#   high-load   Burst traffic → increased RPS metric
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vroom-scenario-injector
  namespace: vroom-dev
  labels:
    app: scenario-injector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-injector
  template:
    metadata:
      labels:
        app: scenario-injector
    spec:
      containers:
        - name: injector
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache curl 2>/dev/null;
              echo "Scenario injector started. SCENARIO=${SCENARIO:-normal}";
              SCENARIO="${SCENARIO:-normal}";
              case "$SCENARIO" in
                normal)
                  echo "Mode: normal — healthy baseline traffic";
                  while true; do
                    curl -sf -o /dev/null http://user-service:8080/health         || true;
                    curl -sf -o /dev/null http://ride-service:8080/healthz         || true;
                    curl -sf -o /dev/null http://dispatch-service:8080/healthz     || true;
                    curl -sf -o /dev/null http://notification-service:8080/health  || true;
                    sleep 2;
                  done
                  ;;
                error-logs)
                  echo "Mode: error-logs — emitting ERROR lines to Loki";
                  while true; do
                    echo "[$(date -Iseconds)] ERROR simulated database error: connection pool exhausted (scenario injection)";
                    echo "[$(date -Iseconds)] ERROR pq: too many connections (scenario injection)";
                    sleep 8;
                  done
                  ;;
                http-errors)
                  echo "Mode: http-errors — generating 4xx HTTP responses";
                  while true; do
                    curl -sf -o /dev/null http://ride-service:8080/v1/trips/nonexistent-test-id-99999 || true;
                    curl -sf -o /dev/null -X POST http://user-service:8080/v1/auth/invalid-test-endpoint || true;
                    curl -sf -o /dev/null http://notification-service:8080/v1/nonexistent || true;
                    sleep 1;
                  done
                  ;;
                high-load)
                  echo "Mode: high-load — burst traffic to increase RPS";
                  while true; do
                    i=0; while [ $i -lt 20 ]; do
                      curl -sf -o /dev/null http://ride-service:8080/healthz &
                      curl -sf -o /dev/null http://user-service:8080/health &
                      i=$((i+1));
                    done;
                    wait; sleep 1;
                  done
                  ;;
                *)
                  echo "Unknown SCENARIO: $SCENARIO. Use: normal, error-logs, http-errors, high-load";
                  sleep 60;
                  ;;
              esac
          env:
            - name: SCENARIO
              value: "normal"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
